<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión</title>
    <link class="shortcut icon" href="assets/img/yo.jpg" type="image/x-icon">

    <meta name="author" content="Alejandro Mesa">
    <meta name="description" content="Panel de login">
    <meta name="keywords" content="LOGIN, login, Login">

    <meta name="theme-color" content="#1328EB">
    <meta name="MobileOptimized" content="width">
    <meta name="HandheldFriendly" content="true">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" crossorigin="anonymous">
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
</head>
<body class="bg-light d-flex align-items-center justify-content-center vh-100">

    <main class="container">
        <div class="row justify-content-center">
            <div class="col-11 col-sm-8 col-md-6 col-lg-4">
                <div class="card shadow border-0 p-3">
                    <div class="card-body">
                        <div class="text-center mb-4">
                            <a href="../index.html" class="text-decoration-none text-dark">
                                <h1 class="h3 fw-bold mt-2">Ingreso Fanáticos</h1>
                            </a>
                        </div>
                        <form>
                            <div class="form-floating mb-3">
                                <input type="email" class="form-control" id="floatingInput" placeholder="nombre@correo.com" required>
                                <label for="floatingInput">Correo electrónico</label>
                            </div>
                            <div class="form-floating mb-3">
                                <input type="password" class="form-control" id="floatingPassword" placeholder="Contraseña" required>
                                <label for="floatingPassword">Contraseña</label>
                            </div>
                            <div class="form-check mb-4">
                                <input class="form-check-input" type="checkbox" id="flexCheckDefault">
                                <label class="form-check-input-label text-muted small" for="flexCheckDefault">
                                    Recordarme en este equipo
                                </label>
                            </div>
                            <button class="btn btn-warning w-100 fw-bold py-2 mb-3 shadow-sm" type="submit">Ingresar</button>
                        </form>
                        <div class="text-center small mt-3">
                            <p class="mb-1"><a href="recuperar.html" class="text-decoration-none text-primary">¿Olvidaste tu contraseña?</a></p>
                            <p class="mb-0 text-muted">¿No tienes cuenta? <a href="registro.html" class="text-decoration-none text-warning fw-bold">Regístrate</a></p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
