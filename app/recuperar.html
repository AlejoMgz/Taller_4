<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recuperar Contraseña</title>
    <link class="shortcut icon" href="assets/img/yo.jpg" type="image/x-icon">

    <meta name="author" content="Alejandro Mesa">
    <meta name="description" content="Recuperar contraseña">
    <meta name="keywords" content="RECUPERAR CONTRASEÑA, recuperar contraseña, Recuperar Contraseña">

    <meta name="theme-color" content="#1328EB">
    <meta name="MobileOptimized" content="width">
    <meta name="HandheldFriendly" content="true">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" crossorigin="anonymous">
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
</head>
<body class="bg-light d-flex align-items-center justify-content-center vh-100">

    <main class="container">
        <div class="row justify-content-center">
            <div class="col-11 col-sm-8 col-md-6 col-lg-4">
                <div class="card shadow border-0 p-3">
                    <div class="card-body">
                        <div class="text-center mb-4">
                            <i class="bi bi-exclamation-triangle-fill display-5 text-danger"></i>
                            <h1 class="h3 fw-bold mt-2">Recuperar Acceso</h1>
                            <p class="text-muted small">Escribe tu correo registrado para restaurar el acceso.</p>
                        </div>
                        <form class="needs-validation" novalidate>
                            <div class="mb-4">
                                <label for="recEmail" class="form-label small fw-bold">Correo de Recuperación</label>
                                <input type="email" class="form-control is-invalid" id="recEmail" value="hincha_inexistente@correo.com" required>
                                <div class="invalid-feedback">
                                    El correo ingresado no se encuentra registrado en nuestra base de datos.
                                </div>
                            </div>
                            <button class="btn btn-danger w-100 fw-bold py-2 shadow-sm" type="button">Buscar Correo</button>
                        </form>
                        <div class="text-center small mt-4">
                            <a href="login.html" class="text-decoration-none text-secondary"><i class="bi bi-arrow-left me-1"></i>Regresar al Login</a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
