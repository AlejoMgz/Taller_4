<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro de fanaticos</title>
    <link class="shortcut icon" href="assets/img/yo.jpg" type="image/x-icon">

    <meta name="author" content="Alejandro Mesa">
    <meta name="description" content="Registro de usuario">
    <meta name="keywords" content="REGISTRO, registro, Registro">

    <meta name="theme-color" content="#1328EB">
    <meta name="MobileOptimized" content="width">
    <meta name="HandheldFriendly" content="true">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" crossorigin="anonymous">
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
</head>
<body class="bg-light d-flex align-items-center justify-content-center py-5 min-vh-100">

    <main class="container">
        <div class="row justify-content-center">
            <div class="col-12 col-md-8 col-lg-6">
                <div class="card shadow border-0 p-3">
                    <div class="card-body">
                        <div class="text-center mb-4">
                            <a href="../index.html" class="text-decoration-none text-dark">
                                <i class="bi bi-person-plus-fill display-5 text-primary"></i>
                                <h1 class="h3 fw-bold mt-2">Únete a la Hinchada</h1>
                            </a>
                        </div>
                        <form>
                            <div class="row g-3 mb-3">
                                <div class="col-12 col-md-6">
                                    <label for="regNombre" class="form-label small fw-bold">Nombre</label>
                                    <input type="text" class="form-control" id="regNombre" placeholder="Tu nombre" required>
                                </div>
                                <div class="col-12 col-md-6">
                                    <label for="regApellidos" class="form-label small fw-bold">Apellidos</label>
                                    <input type="text" class="form-control" id="regApellidos" placeholder="Tus apellidos" required>
                                </div>
                            </div>
                            <div class="row g-3 mb-4">
                                <div class="col-12 col-md-6">
                                    <label for="regCorreo" class="form-label small fw-bold">Correo Electrónico</label>
                                    <input type="email" class="form-control" id="regCorreo" placeholder="correo@ejemplo.com" required>
                                </div>
                                <div class="col-12 col-md-6">
                                    <label for="regTelefono" class="form-label small fw-bold">Teléfono Celular</label>
                                    <input type="tel" class="form-control" id="regTelefono" placeholder="3000000000" required>
                                </div>
                            </div>
                            <button class="btn btn-primary w-100 fw-bold py-2 shadow-sm" type="submit">Crear Cuenta Fanático</button>
                        </form>
                        <div class="text-center small mt-4">
                            <p class="mb-0 text-muted">¿Ya tienes cuenta? <a href="login.html" class="text-decoration-none text-primary fw-bold">Inicia Sesión</a></p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
